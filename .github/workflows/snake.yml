# ══════════════════════════════════════════════════════════
#  🐍 GitHub Action — Snake eating contributions
#  Fichier à placer dans :
#  OmegaOneCTRL/.github/workflows/snake.yml
#
#  Le SVG généré sera dispo sur la branche "output" :
#  https://raw.githubusercontent.com/OmegaOneCTRL/OmegaOneCTRL/output/github-snake.svg
#  https://raw.githubusercontent.com/OmegaOneCTRL/OmegaOneCTRL/output/github-snake-dark.svg
# ══════════════════════════════════════════════════════════

name: 🐍 Generate Snake

on:
  schedule:
    # Se déclenche toutes les 6 heures
    - cron: "0 */6 * * *"
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVG (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#c9a84c&color_dots=#0d1117,#1a2e1f,#1d4a2a,#2a7a3e,#3fb68b

      - name: Push SVG vers la branche output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

